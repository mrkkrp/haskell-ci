# Example: Multi-package project (like megaparsec, parser-combinators)
# Place this in your repository's .github/workflows/ci.yml

name: CI
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  ci:
    uses: mrkkrp/haskell-ci/.github/workflows/haskell-ci.yml@main
    with:
      # Specify subdirectories containing additional .cabal packages
      # These will get formatting checks, cabal check, haddock, and sdist
      # (The main package in the root is always processed)
      additional-packages: 'megaparsec-tests'